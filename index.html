<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Charm — Gear, Spaces, People for Creators</title>
<meta name="description" content="Charm — a marketplace for creators. Buy and rent cameras, audio, lighting, instruments. Book studios, hire pros. One account, one platform.">
<link rel="canonical" href="https://aireyai.github.io/charm/">

<meta property="og:title" content="Charm">
<meta property="og:description" content="A marketplace for creators. Gear, spaces, pros.">
<meta property="og:image" content="https://aireyai.github.io/charm/images/hero-studio.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="favicon.svg">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="images/hero-studio.jpg" fetchpriority="high">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;450;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="charm-v2.css">

<style>
  html, body { height: 100%; overflow: hidden; background: #000; }
  .splash {
    position: fixed;
    inset: 0;
    color: #fff;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }
  .splash-body { flex: 1; min-height: 0; }
  .splash-media {
    position: absolute; inset: 0; z-index: 0;
    transform: scale(1.05);
    animation: slow-zoom 14s ease-out forwards;
  }
  .splash-media img { width: 100%; height: 100%; object-fit: cover; }
  .splash-media::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.5) 45%, rgba(0,0,0,0.88) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0) 25%, rgba(0,0,0,0) 72%, rgba(0,0,0,0.85) 100%);
  }
  @keyframes slow-zoom {
    0%   { transform: scale(1.05); }
    100% { transform: scale(1.00); }
  }

  .splash-top, .splash-bottom {
    position: relative; z-index: 2;
    padding: var(--s-6) var(--s-7);
    display: flex; align-items: center; justify-content: space-between;
  }
  .splash-top { padding-top: var(--s-5); }
  .splash-bottom { padding-bottom: var(--s-7); flex-wrap: wrap; gap: var(--s-4); }

  .splash-brand {
    font-family: var(--f-display);
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.4px;
    color: #fff;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .splash-brand::before {
    content: ''; width: 10px; height: 10px; background: #fff;
    transform: rotate(45deg); border-radius: 1px; display: inline-block;
  }

  .splash-meta {
    font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }

  .splash-body {
    position: relative; z-index: 2;
    display: flex;
    align-items: flex-end;
    padding: var(--s-7);
    padding-bottom: var(--s-4);
    max-width: 100%;
    min-height: 0;
  }
  .splash-title {
    font-family: var(--f-display);
    font-size: clamp(44px, min(10vw, 14vh), 128px);
    font-weight: 400;
    line-height: 0.94;
    letter-spacing: -2.6px;
    margin: 0;
    color: #fff;
    text-wrap: balance;
    animation: rise 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s backwards;
    max-width: 14ch;
  }
  .splash-title em {
    font-style: normal;
    color: rgba(255,255,255,0.55);
  }

  @keyframes rise {
    0%   { opacity: 0; transform: translateY(50px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .splash-bottom-left { max-width: 48ch; animation: fade 1s ease 1.2s backwards; }
  .splash-lede { font-size: 16px; line-height: 1.5; color: rgba(255,255,255,0.75); margin: 0; letter-spacing: -0.16px; }

  .splash-cta-group { display: flex; gap: var(--s-3); animation: fade 1s ease 1.6s backwards; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .splash-bottom .btn--primary { background: #fff; color: #000; }
  .splash-bottom .btn--primary:hover { background: #e8e8e8; }
  .splash-bottom .btn--ghost { color: #fff; border-color: rgba(255,255,255,0.3); }
  .splash-bottom .btn--ghost:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.55); }

  .splash-corner {
    position: absolute;
    width: 24px; height: 24px;
    border: 1px solid rgba(255,255,255,0.45);
    z-index: 2;
    animation: fade 1.4s ease 0.2s backwards;
  }
  .splash-corner.tl { top: 24px; left: 24px; border-right: 0; border-bottom: 0; }
  .splash-corner.tr { top: 24px; right: 24px; border-left: 0; border-bottom: 0; }
  .splash-corner.bl { bottom: 24px; left: 24px; border-right: 0; border-top: 0; }
  .splash-corner.br { bottom: 24px; right: 24px; border-left: 0; border-top: 0; }

  .splash-enter-hint {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    bottom: var(--s-8);
    z-index: 2;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    display: flex; align-items: center; gap: 10px;
    animation: fade 1s ease 2.2s backwards;
  }
  .splash-enter-hint::before,
  .splash-enter-hint::after {
    content: ''; width: 32px; height: 1px; background: rgba(255,255,255,0.28);
  }

  /* Curtain transition */
  .curtain {
    position: fixed; inset: 0;
    background: #000;
    z-index: 9999;
    transform: translateY(100%);
    transition: transform 700ms cubic-bezier(0.76, 0, 0.24, 1);
    pointer-events: none;
  }
  .curtain.is-closing { transform: translateY(0); pointer-events: auto; }

  @media (prefers-reduced-motion: reduce) {
    .splash-media { animation: none; transform: scale(1); }
    .splash-title, .splash-bottom-left, .splash-cta-group, .splash-corner, .splash-enter-hint { animation: none; opacity: 1; transform: none; }
  }

  @media (max-width: 760px) {
    .splash-body { padding: var(--s-5); }
    .splash-bottom { flex-direction: column; align-items: flex-start; gap: var(--s-5); padding: 0 var(--s-5) var(--s-6); }
    .splash-title { letter-spacing: -2.4px; line-height: 0.95; }
    .splash-enter-hint { display: none; }
  }
</style>
</head>
<body>

<div class="splash" role="main">
  <div class="splash-media" aria-hidden="true">
    <img src="images/hero-studio.jpg" alt="">
  </div>

  <div class="splash-corner tl"></div>
  <div class="splash-corner tr"></div>
  <div class="splash-corner bl"></div>
  <div class="splash-corner br"></div>

  <header class="splash-top">
    <div class="splash-brand">Charm</div>
    <div class="splash-meta">— v2.0 · 2026</div>
  </header>

  <div class="splash-body">
    <h1 class="splash-title">Made for<br>the people<br><em>making the work.</em></h1>
  </div>

  <footer class="splash-bottom">
    <div class="splash-bottom-left">
      <p class="splash-lede">
        A marketplace for creators. Buy and rent gear, book the spaces, hire the pros.
        One platform. One account.
      </p>
    </div>
    <div class="splash-cta-group">
      <a href="home.html" class="btn btn--primary btn--lg btn--arrow" id="enter-btn" onclick="enter(event)">Enter</a>
      <a href="marketplace.html" class="btn btn--ghost btn--lg">Browse marketplace</a>
    </div>
  </footer>

  <div class="splash-enter-hint">Press <span style="color:#fff;">Enter</span> or click to continue</div>
</div>

<div class="curtain" id="curtain"></div>

<script>
  const curtain = document.getElementById('curtain');

  function enter(e) {
    if (e) e.preventDefault();
    curtain.classList.add('is-closing');
    setTimeout(() => { window.location.href = 'home.html'; }, 600);
  }

  // Keyboard shortcuts (not when focus is in a form field)
  document.addEventListener('keydown', (e) => {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); enter(); }
  });

  // Auto-advance after 10s (can be skipped with any click/key)
  let autoAdvance = setTimeout(enter, 10000);

  // Pause when tab hidden
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { clearTimeout(autoAdvance); }
    else { autoAdvance = setTimeout(enter, 8000); }
  });

  // Respect reduced motion — no auto-advance
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    clearTimeout(autoAdvance);
  }
</script>

</body>
</html>
