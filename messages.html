<html lang="en">
<head>

  <!-- Theme -->
  <meta name="theme-color" content="#07070e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --c-base: #07070e;
      --c-card: #0d0d1a;
      --c-elevated: #131326;
      --c-float: #1a1a32;
      --c-gold: #e2a84b;
      --c-gold-dim: rgba(226,168,75,0.14);
      --c-violet: #9d6fff;
      --c-coral: #ff6b57;
      --c-cyan: #00d4c8;
      --c-text: #f0ece3;
      --c-text-2: #9896a8;
      --c-text-3: #8886a0;
      --c-border: rgba(255,255,255,0.07);
      --c-border-2: rgba(255,255,255,0.13);
      --z-sticky: 500;
      --z-top: 9999;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      background: var(--c-base);
      color: var(--c-text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    * { -webkit-tap-highlight-color: transparent; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    :focus { outline: none; }
    :focus-visible { outline: 2px solid var(--c-gold); outline-offset: 2px; border-radius: 3px; }
    ::selection { background: rgba(226,168,75,0.3); color: var(--c-text); }
    button, a { cursor: pointer; }

    .noise {
      position: fixed; inset: 0; z-index: var(--z-top); pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    /* ── NAV ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: var(--z-sticky);
      padding: 14px 48px;
      background: rgba(7,7,14,0.92);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid var(--c-border);
      height: 64px;
    }
    .nav-inner {
      max-width: 1320px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 36px;
    }
    .logo {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 21px;
      letter-spacing: -0.02em; color: var(--c-text);
      text-decoration: none; display: flex; align-items: center; gap: 9px;
    }
    .logo-gem {
      width: 30px; height: 30px; border-radius: 7px;
      background: linear-gradient(135deg, #e2a84b 0%, #f5d080 60%, #c98830 100%);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      box-shadow: 0 2px 12px rgba(226,168,75,0.35);
    }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a {
      font-family: 'Syne', sans-serif; font-size: 13.5px; font-weight: 500;
      color: var(--c-text-2); text-decoration: none; letter-spacing: 0.005em;
      transition: color 0.2s ease;
    }
    .nav-links a:hover { color: var(--c-text); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-icon-btn {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: var(--c-text-2); text-decoration: none; font-size: 15px;
      border: 1px solid var(--c-border); background: transparent;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .nav-icon-btn:hover { color: var(--c-text); background: rgba(255,255,255,0.06); border-color: var(--c-border-2); }
    .nav-icon-btn.active { color: var(--c-gold); border-color: rgba(226,168,75,0.3); background: var(--c-gold-dim); }
    .btn-ghost {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--c-text-2); background: transparent;
      border: 1px solid var(--c-border-2); border-radius: 9px;
      padding: 8px 16px; text-decoration: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .btn-ghost:hover { color: var(--c-text); border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.05); }
    .btn-gold {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: #0f0800; background: var(--c-gold);
      border: none; border-radius: 9px; padding: 9px 20px; text-decoration: none;
      box-shadow: 0 2px 14px rgba(226,168,75,0.28);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s, background 0.2s;
    }
    .btn-gold:hover { background: #ebb850; transform: translateY(-1px); box-shadow: 0 5px 22px rgba(226,168,75,0.44); }

    /* ── MESSAGES LAYOUT ── */
    .msgs-shell {
      display: flex;
      height: 100vh; height: 100dvh;
      padding-top: 64px;
    }

    /* Left panel */
    .panel-left {
      width: 360px; min-width: 360px;
      border-right: 1px solid var(--c-border);
      display: flex; flex-direction: column;
      background: var(--c-card);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .panel-left-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }
    .panel-left-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px;
      color: var(--c-text); margin-bottom: 14px;
      letter-spacing: -0.02em;
    }
    .search-wrap {
      position: relative;
    }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--c-text-3); font-size: 14px; pointer-events: none;
    }
    .search-input {
      width: 100%; background: var(--c-elevated);
      border: 1px solid var(--c-border); border-radius: 10px;
      padding: 9px 12px 9px 36px;
      color: var(--c-text); font-family: 'DM Sans', sans-serif; font-size: 13.5px;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input::placeholder { color: var(--c-text-3); }
    .search-input:focus { border-color: rgba(226,168,75,0.35); background: var(--c-float); outline: none; }

    .conv-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .conv-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px; cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: var(--c-gold-dim); }
    .conv-item.active::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: var(--c-gold); border-radius: 0 2px 2px 0;
    }
    .conv-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px;
      letter-spacing: 0.02em;
    }
    .conv-body { flex: 1; min-width: 0; }
    .conv-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 3px;
    }
    .conv-name {
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13.5px;
      color: var(--c-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-time {
      font-size: 11px; color: var(--c-text-3); flex-shrink: 0; margin-left: 8px;
    }
    .conv-bottom { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .conv-preview {
      font-size: 12.5px; color: var(--c-text-2);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      flex: 1; min-width: 0;
    }
    .conv-unread {
      width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
      background: var(--c-gold); color: #0f0800;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .conv-role-tag {
      font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 600;
      letter-spacing: 0.04em; padding: 2px 6px; border-radius: 4px;
      margin-bottom: 4px; display: inline-block;
    }
    .tag-buyer { background: rgba(0,212,200,0.12); color: var(--c-cyan); }
    .tag-seller { background: rgba(157,111,255,0.12); color: var(--c-violet); }

    /* Right panel */
    .panel-right {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      background: var(--c-base);
    }

    /* Empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: var(--c-text-3);
    }
    .empty-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--c-card); border: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .empty-title {
      font-family: 'Syne', sans-serif; font-weight: 600; font-size: 16px;
      color: var(--c-text-2);
    }
    .empty-sub { font-size: 13.5px; text-align: center; max-width: 260px; line-height: 1.6; }

    /* Chat header */
    .chat-header {
      padding: 0 24px;
      height: 65px; flex-shrink: 0;
      border-bottom: 1px solid var(--c-border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--c-card);
    }
    .chat-header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .chat-back-btn {
      display: none;
      background: transparent; border: 1px solid var(--c-border);
      color: var(--c-text-2); width: 34px; height: 34px; border-radius: 8px;
      align-items: center; justify-content: center; font-size: 16px;
      transition: color 0.2s, background 0.2s;
    }
    .chat-back-btn:hover { color: var(--c-text); background: rgba(255,255,255,0.05); }
    .chat-header-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: var(--c-text);
    }
    .chat-header-status {
      font-size: 12px; color: var(--c-text-3);
    }
    .chat-header-actions { display: flex; gap: 8px; }
    .chat-action-btn {
      background: transparent; border: 1px solid var(--c-border); border-radius: 8px;
      color: var(--c-text-2); width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .chat-action-btn:hover { color: var(--c-text); background: rgba(255,255,255,0.05); border-color: var(--c-border-2); }

    /* Listing context card */
    .listing-ctx {
      margin: 14px 20px 0;
      border-radius: 12px;
      border: 1px solid var(--c-border);
      background: var(--c-card);
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      flex-shrink: 0;
    }
    .listing-ctx-thumb {
      width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .listing-ctx-name {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
      color: var(--c-text); line-height: 1.3;
    }
    .listing-ctx-price {
      font-size: 12px; color: var(--c-gold); font-weight: 500; margin-top: 1px;
    }
    .listing-ctx-badge {
      margin-left: auto; flex-shrink: 0;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; color: var(--c-text-3);
      background: var(--c-elevated); border: 1px solid var(--c-border);
      padding: 3px 8px; border-radius: 6px;
      text-transform: uppercase;
    }

    /* Messages thread */
    .chat-thread {
      flex: 1; overflow-y: auto;
      padding: 20px 20px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .msg-date-divider {
      text-align: center; font-size: 11px; font-family: 'Syne', sans-serif;
      font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--c-text-3); padding: 12px 0 8px; position: relative;
    }
    .msg-date-divider::before, .msg-date-divider::after {
      content: ''; position: absolute; top: 50%; width: calc(50% - 60px);
      height: 1px; background: var(--c-border);
    }
    .msg-date-divider::before { left: 0; }
    .msg-date-divider::after { right: 0; }

    .msg-row {
      display: flex; align-items: flex-end; gap: 8px;
      margin-bottom: 2px;
    }
    .msg-row.sent { flex-direction: row-reverse; }
    .msg-avatar-sm {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 10px;
      margin-bottom: 2px;
    }
    .msg-bubble-wrap { max-width: 72%; display: flex; flex-direction: column; }
    .msg-row.sent .msg-bubble-wrap { align-items: flex-end; }
    .msg-bubble {
      padding: 10px 14px; border-radius: 16px; line-height: 1.55;
      font-size: 14px; word-break: break-word;
    }
    .msg-bubble.received {
      background: var(--c-elevated);
      color: var(--c-text);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble.sent {
      background: linear-gradient(135deg, rgba(226,168,75,0.22) 0%, rgba(226,168,75,0.14) 100%);
      border: 1px solid rgba(226,168,75,0.2);
      color: var(--c-text);
      border-bottom-right-radius: 4px;
    }
    .msg-meta {
      display: flex; align-items: center; gap: 5px;
      font-size: 10.5px; color: var(--c-text-3); margin-top: 3px; padding: 0 2px;
    }
    .msg-row.sent .msg-meta { flex-direction: row-reverse; }
    .msg-receipt { font-size: 12px; }
    .msg-receipt.read { color: var(--c-cyan); }

    /* Typing indicator */
    .typing-row {
      display: flex; align-items: flex-end; gap: 8px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.2s ease, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
    }
    .typing-row.visible { opacity: 1; transform: translateY(0); }
    .typing-bubble {
      background: var(--c-elevated); border-radius: 16px; border-bottom-left-radius: 4px;
      padding: 12px 16px; display: flex; align-items: center; gap: 4px;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--c-text-3);
      animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* Input bar */
    .chat-input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--c-border);
      background: var(--c-card);
      display: flex; align-items: flex-end; gap: 10px;
      flex-shrink: 0;
    }
    .chat-input-actions { display: flex; gap: 6px; }
    .input-action-btn {
      width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
      background: var(--c-elevated); border: 1px solid var(--c-border);
      color: var(--c-text-3); font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .input-action-btn:hover { color: var(--c-text-2); background: var(--c-float); border-color: var(--c-border-2); }
    .chat-input-field {
      flex: 1; background: var(--c-elevated); border: 1px solid var(--c-border);
      border-radius: 12px; padding: 9px 14px; color: var(--c-text);
      font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5;
      resize: none; max-height: 120px; overflow-y: auto; min-height: 36px;
      transition: border-color 0.2s, background 0.2s;
    }
    .chat-input-field::placeholder { color: var(--c-text-3); }
    .chat-input-field:focus { border-color: rgba(226,168,75,0.35); background: var(--c-float); outline: none; }
    .chat-send-btn {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      background: var(--c-gold); border: none; color: #0f0800; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(226,168,75,0.3);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, background 0.2s;
    }
    .chat-send-btn:hover { background: #ebb850; transform: scale(1.06); box-shadow: 0 4px 20px rgba(226,168,75,0.45); }
    .chat-send-btn:active { transform: scale(0.96); }

    /* Active conversation highlight in list */
    .conv-item.active .conv-name { color: var(--c-text); }
    .conv-item.active .conv-preview { color: var(--c-text-2); }

    /* Mobile */
    @media (max-width: 768px) {
      .nav { padding: 14px 16px; }
      .nav-links { display: none; }
      .msgs-shell { flex-direction: column; }
      .panel-left {
        width: 100%; min-width: unset;
        position: absolute; top: 64px; left: 0; right: 0; bottom: 0;
        z-index: 10;
        transform: translateX(0);
      }
      .panel-left.hidden { transform: translateX(-100%); }
      .panel-right { width: 100%; }
      .chat-back-btn { display: flex; }
      .listing-ctx { margin: 10px 14px 0; }
      .chat-thread { padding: 14px 14px 10px; }
      .chat-input-bar { padding: 10px 14px; }
    }

    /* Animations */
    .msg-row { animation: msgIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .panel-left-header, .conv-list { animation: fadeUp 0.4s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* New message bubble animation */
    .msg-row.new-in { animation: newMsgIn 0.32s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes newMsgIn {
      from { opacity: 0; transform: translateY(16px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
  <link rel="stylesheet" href="charm-v2-compat.css">
</head>

<!-- MAIN -->
<main id="main-content" class="msgs-shell">
  <!-- LEFT PANEL: Conversation list -->
  <aside class="panel-left" id="panelLeft" role="complementary" aria-label="Conversations">
    <div class="panel-left-header">
      <div class="panel-left-title">Messages</div>
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">⌕</span>
        <input type="search" class="search-input" id="convSearch" placeholder="Search conversations…" aria-label="Search conversations">
      </div>
    </div>
    <div class="conv-list" id="convList" role="list" aria-label="Conversation list"></div>
  </aside>

  <!-- RIGHT PANEL: Chat thread -->
  <section class="panel-right" id="panelRight" aria-label="Chat thread">
    <!-- Empty state (default) -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon" aria-hidden="true">✉</div>
      <div class="empty-title">Select a conversation</div>
      <p class="empty-sub">Choose from your active conversations to start messaging</p>
    </div>

    <!-- Chat view (hidden by default) -->
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;" role="region" aria-label="Active chat">
      <div class="chat-header" id="chatHeader">
        <div class="chat-header-left">
          <button class="chat-back-btn" id="backBtn" aria-label="Back to conversations">←</button>
          <div id="chatHeaderAvatar" class="conv-avatar" style="width:36px;height:36px;font-size:11px;" aria-hidden="true"></div>
          <div>
            <div class="chat-header-name" id="chatHeaderName"></div>
            <div class="chat-header-status" id="chatHeaderStatus"></div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" title="View profile" aria-label="View profile">👤</button>
          <button class="chat-action-btn" title="View listing" aria-label="View listing">📦</button>
          <button class="chat-action-btn" title="More options" aria-label="More options">⋯</button>
        </div>
      </div>

      <div class="listing-ctx" id="listingCtx" aria-label="Listing context"></div>

      <div class="chat-thread" id="chatThread" role="log" aria-live="polite" aria-label="Messages"></div>

      <div class="chat-input-bar">
        <div class="chat-input-actions">
          <button class="input-action-btn" title="Attach image" aria-label="Attach image">📎</button>
          <button class="input-action-btn" title="Emoji" aria-label="Insert emoji">😊</button>
        </div>
        <textarea class="chat-input-field" id="msgInput" placeholder="Type a message…" rows="1" aria-label="Message input"></textarea>
        <button class="chat-send-btn" id="sendBtn" aria-label="Send message">➤</button>
      </div>
    </div>
  </section>
</main>

      { id: 3, from: 'them', text: 'Perfect for my trip, thanks so much!', time: 'Last week', read: true },
    ]
  }
];

// Mock auto-replies
const AUTO_REPLIES = {
  1: ['Yes, it\'s available Saturday! I can do an early morning drop-off if that helps.', 'What time works for you? I\'m flexible before 9am.'],
  2: ['Can\'t wait — it\'s going to be a great session.', 'I\'ll bring a few patch cables too, no extra charge.'],
  3: ['Absolutely — 3 days would be £90, saving you £15. Shall I update the listing?', 'I can also throw in a diffusion softbox for free.'],
  4: ['We\'d love to have you back! Five-star review incoming 😊', 'Any time — see you on the next shoot.'],
  5: ['Brilliant, I\'ll mark Thursday as confirmed on my end.', 'Will drop the case and remote controller too.'],
  6: ['Yes, fully compatible with Logic Pro on M2 — plug and play, no drivers needed.', 'Happy to hold it for you. Just book when ready!'],
  7: ['Great! I\'ll have it charged and ready. Comes with all original cables.', 'Let me know if you need the Thunderbolt cable too.'],
  8: ['So glad it worked out! Safe travels wherever you\'re headed.', 'Do leave a review when you\'re back — really helps!'],
};

// State
let activeId = null;
let conversations = JSON.parse(localStorage.getItem('charm-conversations') || 'null') || MOCK_CONVS;
let typingTimeout = null;

function saveConversations() {
  localStorage.setItem('charm-conversations', JSON.stringify(conversations));
}

function getConv(id) {
  return conversations.find(c => c.id === id);
}

function renderAvatar(initials, size = 44) {
  const style = AVATARS[initials] || { bg: 'var(--c-elevated)', color: 'var(--c-text-2)' };
  return `style="width:${size}px;height:${size}px;background:${style.bg};color:${style.color}"`;
}

function renderConvList(filter = '') {
  const list = document.getElementById('convList');
  const filtered = conversations.filter(c =>
    c.name.toLowerCase().includes(filter.toLowerCase()) ||
    c.listing.toLowerCase().includes(filter.toLowerCase())
  );
  list.innerHTML = filtered.map(c => `
    <div class="conv-item ${c.id === activeId ? 'active' : ''}" data-id="${c.id}" role="listitem" tabindex="0" aria-label="Conversation with ${c.name}">
      <div class="conv-avatar" ${renderAvatar(c.avatar, 44)} aria-hidden="true">
        ${c.avatar}
        ${c.online ? `<span style="position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:#00d4c8;border:2px solid var(--c-card);" aria-label="Online"></span>` : ''}
      </div>
      <div class="conv-body">
        <div class="conv-top">
          <span class="conv-name">${c.name}</span>
          <span class="conv-time">${c.time}</span>
        </div>
        <div style="margin-bottom:3px;">
          <span class="conv-role-tag ${c.role === 'Buyer' ? 'tag-buyer' : 'tag-seller'}">${c.role}</span>
        </div>
        <div class="conv-bottom">
          <span class="conv-preview">${c.lastMsg}</span>
          ${c.unread > 0 ? `<span class="conv-unread" aria-label="${c.unread} unread">${c.unread}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  // Bind clicks
  list.querySelectorAll('.conv-item').forEach(el => {
    el.addEventListener('click', () => openConv(parseInt(el.dataset.id)));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openConv(parseInt(el.dataset.id)); });
  });
}

function renderListingCtx(conv) {
  const icon = LISTING_ICONS[conv.listingIcon] || '📦';
  const gradients = {
    camera: 'linear-gradient(135deg,#1a1a32,#2a1a3a)',
    synth: 'linear-gradient(135deg,#0d1a32,#1a2a0d)',
    lights: 'linear-gradient(135deg,#1a1400,#2a2400)',
    lens: 'linear-gradient(135deg,#0d1a1a,#1a0d2a)',
    drone: 'linear-gradient(135deg,#0d0d1a,#1a1032)',
    mixer: 'linear-gradient(135deg,#1a0d1a,#0d1a1a)',
    monitor: 'linear-gradient(135deg,#0d1a2a,#1a1a32)',
    bag: 'linear-gradient(135deg,#1a1a0d,#0d1a0d)',
  };
  const bg = gradients[conv.listingIcon] || 'linear-gradient(135deg,#1a1a32,#0d0d1a)';
  return `
    <div class="listing-ctx-thumb" style="background:${bg};">${icon}</div>
    <div>
      <div class="listing-ctx-name">${conv.listing}</div>
      <div class="listing-ctx-price">${conv.price}</div>
    </div>
    <span class="listing-ctx-badge">Listing</span>
  `;
}

function renderMessages(conv) {
  const thread = document.getElementById('chatThread');
  const msgs = conv.messages;

  let html = `<div class="msg-date-divider">Today</div>`;
  msgs.forEach((msg, i) => {
    const isMe = msg.from === 'me';
    const avatarStyle = AVATARS[conv.avatar] || {};
    const showAvatar = !isMe && (i === 0 || msgs[i - 1].from !== 'them');

    html += `
      <div class="msg-row ${isMe ? 'sent' : 'received'}">
        ${!isMe ? `<div class="msg-avatar-sm" ${renderAvatar(conv.avatar, 28)} aria-hidden="true">${showAvatar ? conv.avatar : ''}</div>` : ''}
        <div class="msg-bubble-wrap">
          <div class="msg-bubble ${isMe ? 'sent' : 'received'}">${escHtml(msg.text)}</div>
          <div class="msg-meta">
            <span>${msg.time}</span>
            ${isMe ? `<span class="msg-receipt ${msg.read ? 'read' : ''}" aria-label="${msg.read ? 'Read' : 'Sent'}">✓✓</span>` : ''}
          </div>
        </div>
        ${isMe ? `<div style="width:28px;flex-shrink:0;"></div>` : ''}
      </div>
    `;
  });

  thread.innerHTML = html;
  thread.innerHTML += `
    <div class="typing-row" id="typingRow" aria-live="polite" aria-label="Typing indicator">
      <div class="msg-avatar-sm" ${renderAvatar(conv.avatar, 28)} aria-hidden="true">${conv.avatar}</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  scrollToBottom();
}

function scrollToBottom() {
  const thread = document.getElementById('chatThread');
  requestAnimationFrame(() => { thread.scrollTop = thread.scrollHeight; });
}

function openConv(id) {
  activeId = id;
  const conv = getConv(id);
  if (!conv) return;

  // Mark as read
  conv.unread = 0;
  conv.messages.forEach(m => m.read = true);
  saveConversations();

  // Update header
  document.getElementById('chatHeaderName').textContent = conv.name;
  document.getElementById('chatHeaderStatus').textContent = conv.online ? '● Online' : 'Last seen recently';
  document.getElementById('chatHeaderStatus').style.color = conv.online ? 'var(--c-cyan)' : 'var(--c-text-3)';
  const avatarEl = document.getElementById('chatHeaderAvatar');
  avatarEl.textContent = conv.avatar;
  Object.assign(avatarEl.style, {
    background: (AVATARS[conv.avatar] || {}).bg || 'var(--c-elevated)',
    color: (AVATARS[conv.avatar] || {}).color || 'var(--c-text)',
  });

  // Listing context
  document.getElementById('listingCtx').innerHTML = renderListingCtx(conv);

  // Messages
  renderMessages(conv);

  // Show chat view
  document.getElementById('emptyState').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';

  // Mobile: hide left panel
  if (window.innerWidth <= 768) {
    document.getElementById('panelLeft').classList.add('hidden');
  }

  // Re-render list to update active state
  renderConvList(document.getElementById('convSearch').value);

  // Focus input
  document.getElementById('msgInput').focus();
}

function sendMessage(text) {
  if (!text.trim() || activeId === null) return;
  const conv = getConv(activeId);
  if (!conv) return;

  const newMsg = {
    id: conv.messages.length + 1,
    from: 'me',
    text: text.trim(),
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    read: false,
  };
  conv.messages.push(newMsg);
  conv.lastMsg = text.trim().slice(0, 50) + (text.length > 50 ? '…' : '');
  conv.time = 'Just now';
  saveConversations();
  renderMessages(conv);
  renderConvList(document.getElementById('convSearch').value);

  // Trigger typing + reply
  triggerTypingAndReply(conv);
}

function triggerTypingAndReply(conv) {
  clearTimeout(typingTimeout);
  const row = document.getElementById('typingRow');
  if (row) {
    row.classList.add('visible');
    scrollToBottom();
  }
  typingTimeout = setTimeout(() => {
    if (row) row.classList.remove('visible');
    const replies = AUTO_REPLIES[conv.id] || ['Thanks for the message! I\'ll get back to you soon.'];
    const reply = replies[Math.floor(Math.random() * replies.length)];
    const replyMsg = {
      id: conv.messages.length + 1,
      from: 'them',
      text: reply,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      read: true,
    };
    conv.messages.push(replyMsg);
    conv.lastMsg = reply.slice(0, 50) + (reply.length > 50 ? '…' : '');
    conv.time = 'Just now';
    saveConversations();
    renderMessages(conv);
    renderConvList(document.getElementById('convSearch').value);
    // Mark last row as new-in
    const thread = document.getElementById('chatThread');
    const rows = thread.querySelectorAll('.msg-row');
    const last = rows[rows.length - 1];
    if (last) { last.classList.add('new-in'); }
  }, 2000);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Init
renderConvList();

// Search
document.getElementById('convSearch').addEventListener('input', e => {
  renderConvList(e.target.value);
});

// Send
document.getElementById('sendBtn').addEventListener('click', () => {
  const input = document.getElementById('msgInput');
  sendMessage(input.value);
  input.value = '';
  input.style.height = 'auto';
});

document.getElementById('msgInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const input = document.getElementById('msgInput');
    sendMessage(input.value);
    input.value = '';
    input.style.height = 'auto';
  }
});

// Auto-resize textarea
document.getElementById('msgInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Back button (mobile)
document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('panelLeft').classList.remove('hidden');
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('emptyState').style.display = 'flex';
  activeId = null;
  renderConvList();
});

// Open first conversation by default on desktop
if (window.innerWidth > 768) {
  openConv(conversations[0].id);
}
</script>
